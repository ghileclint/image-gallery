<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My images</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <main>
      <section class="grid-container">
        <div class="grid-boxes">
          <img
            src="standalone-img-folder/chatcpt.png"
            alt=""
            class="images"
            loading="lazy"
          />
        </div>
        <div class="grid-boxes">
          <img
            src="standalone-img-folder/logo.png"
            alt=""
            class="images"
            loading="lazy"
          />
        </div>
        <div class="grid-boxes">
          <img
            src="standalone-img-folder/jailed-mugshot.png"
            alt=""
            class="images"
            loading="lazy"
          />
        </div>
        <div class="grid-boxes">
          <img
            src="standalone-img-folder/chatcpt.png"
            alt=""
            class="images"
            loading="lazy"
          />
        </div>
      </section>

      <section class="modalContainer" id="modalContainer">
        <span class="close">&times;</span>
        <span class="nextBtn">&#10095;</span>
        <span class="previousBtn">&#10094;</span>

        <img id="modalImage" alt="" class="modalImage" />
      </section>
    </main>
  </body>
</html>
